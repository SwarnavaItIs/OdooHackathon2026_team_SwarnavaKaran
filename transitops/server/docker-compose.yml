services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: transitops
    ports:
      - "5432:5432"
    volumes:
      - transitops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transitops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  transitops-postgres-data:
